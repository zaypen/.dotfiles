"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](red)\
$username\
[](bg:peach fg:red)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
$git_state\
[](fg:yellow bg:green)\
[\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
](bg:green)\
[](fg:green bg:sapphire)\
$nix_shell\
$docker_context\
$kubernetes\
$conda\
[ ](fg:sapphire)\
$line_break\
$character
"""

right_format = "$time"

palette = 'catppuccin_macchiato'

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[$user]($style)'

[directory]
format = "[ $path ]($style)"
style = "bg:peach fg:crust"
fish_style_pwd_dir_length = 1
truncate_to_repo = true
read_only_style = "red"
read_only = ""

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[custom.languages]
style = "bg:green"
format = """
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
"""

[nodejs]
symbol = ""
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = " "
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = ""
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = ""
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = ""
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = " "
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = ""
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = ""
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[nix_shell]
symbol = " 󱄅 "
style = "fg:crust bg:sapphire"
format = "[$symbol$state( ($name))]($style)"
impure_msg = "impure"
pure_msg = "pure"

[kubernetes]
symbol = " ☸ "
style = "fg:crust bg:sapphire"
format = "[$symbol$context( ($namespace))]($style) "
disabled = false

[docker_context]
symbol = "  "
style = "bg:sapphire"
format = '[[$symbol( $context)](fg:crust bg:sapphire)]($style)'

[conda]
symbol = "  "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%T"
utc_time_offset = "-5"
time_range = "10:00..20:00"

[cmd_duration]
min_time = 1000
format = "took [$duration]($style)"
style = "bold yellow"

